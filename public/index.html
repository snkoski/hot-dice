<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Dice Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .subtitle {
      font-size: 1.2em;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #667eea;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .strategy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .strategy-card {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .strategy-card:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    }

    .strategy-card.selected {
      border-color: #667eea;
      background: #f0f4ff;
    }

    .strategy-card h3 {
      color: #667eea;
      margin-bottom: 5px;
    }

    .strategy-card p {
      font-size: 0.9em;
      color: #666;
    }

    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .control-group {
      flex: 1;
      min-width: 200px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #555;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1em;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease;
      width: 100%;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .progress-bar {
      width: 100%;
      height: 30px;
      background: #e0e0e0;
      border-radius: 15px;
      overflow: hidden;
      margin: 20px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .result-card {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
    }

    .result-card.winner {
      border-color: #ffd700;
      background: #fffef0;
    }

    .rank {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .stat-label {
      color: #666;
    }

    .stat-value {
      font-weight: 600;
      color: #333;
    }

    .hidden {
      display: none;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎲 Hot Dice Simulator</h1>
      <p class="subtitle">Compare strategies and see which wins!</p>
    </header>

    <div class="card">
      <h2 class="section-title">1. Select Strategies</h2>
      <div id="strategies" class="strategy-grid">
        <!-- Strategies will be loaded here -->
      </div>
      <p id="selection-hint" style="color: #666; font-style: italic;">Select at least 2 strategies to compare</p>
    </div>

    <div class="card">
      <h2 class="section-title">2. Configure Simulation</h2>
      <div class="controls">
        <div class="control-group">
          <label for="gameCount">Number of Games</label>
          <input type="number" id="gameCount" value="100" min="1" max="10000">
        </div>
        <div class="control-group">
          <label for="targetScore">Target Score</label>
          <input type="number" id="targetScore" value="10000" min="1000" step="1000">
        </div>
        <div class="control-group">
          <label for="minScore">Minimum to Board</label>
          <input type="number" id="minScore" value="500" min="100" step="100">
        </div>
      </div>
      <button id="runBtn" disabled>Run Simulation</button>
    </div>

    <div id="progressSection" class="card hidden">
      <h2 class="section-title">Running Simulation...</h2>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill">0%</div>
      </div>
      <p id="progressText" style="text-align: center; color: #666;"></p>
    </div>

    <div id="resultsSection" class="card hidden">
      <h2 class="section-title">Results</h2>
      <div id="results" class="results-grid">
        <!-- Results will be displayed here -->
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
